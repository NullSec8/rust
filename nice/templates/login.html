<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Scubydoo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: monospace;
      background: url('https://imgs.search.brave.com/ujNO5aDzPsqy8UHWNvHRnpEmGTVyDPzkf5S_mR_3hx4/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93YWxs/cGFwZXJzLmNvbS9p/bWFnZXMvZmVhdHVy/ZWQvaGVsbG8ta2l0/dHktYWVzdGhldGlj/LW51eDhwMGswZXM0/YzV0Z24uanBn') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.4s ease;
    }

    .login-box {
      background: rgba(255, 255, 255, 0.3);
      border: 2px solid rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 30px;
      border-radius: 10px;
      text-align: center;
      width: 320px;
      color: black;
      box-shadow: 0 0 15px rgba(255, 105, 180, 0.6);
      transition: all 0.4s ease;
    }

    body.dark-mode .login-box {
      background: rgba(20, 20, 20, 0.7);
      border-color: #aaa;
      color: white;
      box-shadow: 0 0 15px rgba(255, 105, 180, 0.4);
    }

    .login-box h2 {
      margin-bottom: 15px;
      font-size: 1.4em;
    }

    input[type="password"] {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 2px solid #aaa;
      font-family: monospace;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }

    input[type="password"]:focus {
      border-color: hotpink;
      box-shadow: 0 0 6px hotpink;
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      background: rgba(255, 105, 180, 0.7);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: rgba(255, 105, 180, 0.9);
    }

    .error {
      color: red;
      margin-top: 10px;
      font-size: 0.9em;
    }

    .footer {
      margin-top: 15px;
      font-size: 0.85em;
      opacity: 0.8;
    }

    /* dark mode toggle */
    #darkModeToggle {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(255,255,255,0.8);
      border: 2px solid #999;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.3s ease, border-color 0.3s ease;
      z-index: 10;
    }

    body.dark-mode #darkModeToggle {
      background: #222;
      color: #fff;
      border-color: #666;
    }
  </style>
</head>
<body>
  

  <form method="post" class="login-box">
    <h2> Welcome to Scubydoo</h2>
    <p>Enter password to access chat</p>

    <input type="password" name="password" placeholder="Password" required />
    <br>
    <button type="submit">Enter</button>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <div class="footer">© 2025 Scubydoo Chatroom</div>
  </form>

 
</body>
</html>

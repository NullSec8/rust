<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎧 Music Lounge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="https://media.discordapp.net/attachments/1160427915645816923/1427021102869254306/81qfkqAAAABklEQVQDAIysGTPlXw7nAAAAAElFTkSuQmCC.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: monospace;
      height: 100vh;
      width: 100vw;
      background-image: url('https://imgs.search.brave.com/ujNO5aDzPsqy8UHWNvHRnpEmGTVyDPzkf5S_mR_3hx4/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly93YWxs/cGFwZXJzLmNvbS9p/bWFnZXMvZmVhdHVy/ZWQvaGVsbG8ta2l0/dHktYWVzdGhldGlj/LW51eDhwMGswZXM0/YzV0Z24uanBn');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background 0.5s, color 0.5s;
      color: black;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body.dark-mode {
      background-image: url('https://imgs.search.brave.com/lPh6m1Pg44mvmXmdiDmGp1KZHur19hQ_5oQ1JnNpN3U/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzLzQ1LzFl/LzM1LzQ1MWUzNWY0/Y2U2NWU1NjNiY2Jj/OTA3ZjQ0ZjZjY2Ux/LmpwZw');
      color: white;
    }

    h1 {
      margin: 60px 20px 20px;
      font-size: 2em;
      text-align: center;
      background: rgba(255, 255, 255, 0.6);
      padding: 10px 20px;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    body.dark-mode h1 {
      background: rgba(0, 0, 0, 0.4);
    }

    .back-button {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(255, 105, 180, 0.4);
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      text-decoration: none;
      font-weight: bold;
      z-index: 9999;
      box-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
      transition: background 0.3s ease;
    }

    .back-button:hover {
      background: rgba(255, 105, 180, 0.6);
    }

    .dark-toggle {
      position: fixed;
      top: 10px;
      right: 10px;
      background-color: white;
      color: #333;
      border: 2px solid #999;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      z-index: 9999;
      transition: background-color 0.3s, border-color 0.3s;
    }

    body.dark-mode .dark-toggle {
      background-color: #2b2b2b;
      color: #eee;
      border-color: #555;
    }

    .music-container {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding-bottom: 40px;
    }

    .music-box {
  width: 560px;
  height: 315px;
  background: rgba(255,255,255,0.85);
  border: 2px solid #000080;
  border-radius: 8px;
  box-shadow: 0 0 15px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
}


    body.dark-mode .music-box {
  background: rgba(30, 30, 30, 0.85);
  border-color: #ccc;
}

   .music-box iframe {
  width: 540px;
  height: 300px;
  border: none;
  border-radius: 6px;
}

    @media (max-width: 400px) {
      .music-box {
        width: 280px;
      }

      iframe {
        width: 260px;
        height: 80px;
      }

      h1 {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-button">⬅ Back</a>

  <button class="dark-toggle" id="darkModeToggle" title="Toggle Dark Mode">
    🌙
  </button>

  

  <div class="music-container">
    <div class="music-box">
      <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div class="music-box">
      <iframe src="https://www.youtube.com/embed/e0beErwinDc" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
    <div class="music-box">
      <iframe src="https://www.youtube.com/embed/5qap5aO4i9A" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById("darkModeToggle");
    toggleBtn.addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      toggleBtn.textContent = document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
    });
  </script>
</body>
</html>
